<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Maqueta Industrial MR — Quest 3</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap');
  :root {
    --hud: rgba(8,16,28,0.85);
    --border: rgba(0,200,255,0.25);
    --accent: #00c8ff;
    --warn: #ff6b35;
    --ok: #39ff8f;
    --panel-w: 320px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#080c14; overflow:hidden; font-family:'Rajdhani',sans-serif; color:#e0f0ff; }

  /* ── LOADING ── */
  #loading {
    position:fixed; inset:0; z-index:100;
    background:#080c14;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px;
  }
  #loading .logo { font-family:'Share Tech Mono',monospace; font-size:1.1rem; color:var(--accent); letter-spacing:4px; }
  #loading h1 { font-size:clamp(1.8rem,4vw,3rem); font-weight:700; letter-spacing:-1px;
    background:linear-gradient(90deg,#00c8ff,#39ff8f); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  #loading p { color:#556; font-size:.9rem; }
  .bar-wrap { width:260px; height:3px; background:#111a26; border-radius:2px; overflow:hidden; }
  .bar-fill { height:100%; width:0%; background:linear-gradient(90deg,#00c8ff,#39ff8f); border-radius:2px; transition:width .3s; }

  /* ── MAIN HUD ── */
  #hud { position:fixed; inset:0; pointer-events:none; z-index:10; display:none; }

  /* top bar */
  #topbar {
    position:absolute; top:0; left:0; right:0; height:52px;
    background:var(--hud); border-bottom:1px solid var(--border);
    display:flex; align-items:center; padding:0 16px; gap:16px;
    pointer-events:all; backdrop-filter:blur(12px);
  }
  #topbar .title { font-family:'Share Tech Mono',monospace; font-size:.85rem; color:var(--accent); letter-spacing:3px; flex:1; }
  .mode-badge {
    padding:4px 12px; border-radius:20px; font-size:.75rem; font-weight:700; letter-spacing:1px;
    border:1px solid var(--accent); color:var(--accent); text-transform:uppercase;
  }
  .mode-badge.mr { border-color:var(--ok); color:var(--ok); }

  /* toolbar left */
  #toolbar {
    position:absolute; top:60px; left:12px;
    display:flex; flex-direction:column; gap:8px;
    pointer-events:all;
  }
  .tool-btn {
    width:48px; height:48px; border-radius:12px;
    background:var(--hud); border:1px solid var(--border);
    color:#8ab; font-size:1.3rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all .15s; backdrop-filter:blur(8px);
    position:relative;
  }
  .tool-btn:hover, .tool-btn.active { border-color:var(--accent); color:var(--accent); box-shadow:0 0 16px rgba(0,200,255,.3); }
  .tool-btn .tip {
    position:absolute; left:56px; top:50%; transform:translateY(-50%);
    background:#0d1622; border:1px solid var(--border); padding:4px 10px;
    border-radius:6px; font-size:.75rem; white-space:nowrap; color:#acd;
    pointer-events:none; opacity:0; transition:opacity .15s;
  }
  .tool-btn:hover .tip { opacity:1; }

  /* categories panel */
  #catPanel {
    position:absolute; top:60px; right:12px; width:var(--panel-w);
    background:var(--hud); border:1px solid var(--border); border-radius:14px;
    backdrop-filter:blur(14px); overflow:hidden;
    pointer-events:all; display:none;
  }
  #catPanel .ph { padding:12px 16px; border-bottom:1px solid var(--border);
    font-size:.8rem; font-weight:700; letter-spacing:2px; color:var(--accent); text-transform:uppercase; }
  .cat-item {
    display:flex; align-items:center; gap:10px; padding:10px 16px;
    cursor:pointer; border-bottom:1px solid rgba(0,200,255,.07); transition:background .1s;
  }
  .cat-item:hover { background:rgba(0,200,255,.06); }
  .cat-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .cat-label { flex:1; font-size:.9rem; }
  .cat-count { font-size:.75rem; color:#556; font-family:'Share Tech Mono',monospace; }
  .eye-btn { font-size:.95rem; opacity:.5; transition:opacity .15s; }
  .cat-item.hidden .eye-btn { opacity:1; color:var(--warn); }
  .cat-item.hidden .cat-label { opacity:.35; text-decoration:line-through; }

  /* properties panel */
  #propPanel {
    position:absolute; bottom:12px; left:12px; width:var(--panel-w);
    background:var(--hud); border:1px solid var(--border); border-radius:14px;
    backdrop-filter:blur(14px); overflow:hidden;
    pointer-events:all; display:none;
  }
  #propPanel .ph {
    padding:10px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; justify-content:space-between;
    font-size:.8rem; font-weight:700; letter-spacing:2px; color:var(--accent); text-transform:uppercase;
  }
  #propPanel .ph .close-btn { cursor:pointer; color:#556; font-size:1rem; transition:color .15s; }
  #propPanel .ph .close-btn:hover { color:var(--warn); }
  .prop-row { display:flex; padding:7px 16px; border-bottom:1px solid rgba(0,200,255,.06); font-size:.85rem; }
  .prop-key { flex:1; color:#5a7a8a; font-family:'Share Tech Mono',monospace; font-size:.78rem; }
  .prop-val { color:#c8e8ff; font-weight:600; }
  .prop-cat-badge { display:inline-block; padding:2px 10px; border-radius:20px; font-size:.75rem; font-weight:700; }

  /* bottom controls */
  #bottomBar {
    position:absolute; bottom:12px; left:50%; transform:translateX(-50%);
    display:flex; gap:10px; pointer-events:all;
  }
  .bottom-btn {
    padding:10px 22px; border-radius:50px; font-size:.85rem; font-weight:700;
    letter-spacing:1px; text-transform:uppercase; cursor:pointer; border:none;
    transition:all .2s; font-family:'Rajdhani',sans-serif;
  }
  #enterMR { background:linear-gradient(135deg,#00c8ff,#0066aa); color:#fff; box-shadow:0 0 24px rgba(0,200,255,.4); }
  #enterMR:hover { box-shadow:0 0 40px rgba(0,200,255,.7); transform:scale(1.03); }
  #walkIn { background:linear-gradient(135deg,#39ff8f,#009944); color:#041; box-shadow:0 0 24px rgba(57,255,143,.3); }
  #walkIn:hover { box-shadow:0 0 40px rgba(57,255,143,.6); transform:scale(1.03); }
  #exitMR { background:rgba(180,30,30,.6); border:1px solid rgba(255,80,80,.5); color:#faa; display:none; }
  #exitMR:hover { background:rgba(220,30,30,.8); }

  /* scale slider */
  #scaleWrap {
    position:absolute; bottom:64px; left:50%; transform:translateX(-50%);
    display:flex; align-items:center; gap:10px; pointer-events:all;
    background:var(--hud); border:1px solid var(--border); border-radius:30px;
    padding:6px 16px; backdrop-filter:blur(8px);
  }
  #scaleWrap label { font-size:.75rem; color:#5a7a8a; font-family:'Share Tech Mono',monospace; }
  #scaleSlider { width:140px; accent-color:var(--accent); cursor:pointer; }
  #scaleVal { font-size:.75rem; color:var(--accent); font-family:'Share Tech Mono',monospace; width:42px; }

  /* selection highlight info */
  #selHint {
    position:absolute; top:60px; left:50%; transform:translateX(-50%);
    background:var(--hud); border:1px solid var(--border); border-radius:20px;
    padding:6px 18px; font-size:.8rem; color:#7af; pointer-events:none;
    backdrop-filter:blur(8px); opacity:0; transition:opacity .3s;
  }
  #selHint.show { opacity:1; }

  canvas { display:block; width:100vw; height:100vh; }
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="logo">// NAVISWORKS MR VIEWER //</div>
  <h1>Maqueta Industrial</h1>
  <p>Generando modelo de planta — cargando Three.js…</p>
  <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
  <p id="loadTxt" style="font-size:.8rem;color:#334">Iniciando motor 3D…</p>
</div>

<!-- HUD -->
<div id="hud">
  <div id="topbar">
    <div class="title">PLANTA INDUSTRIAL · ÁREA 4200</div>
    <div class="mode-badge" id="modeBadge">3D PREVIEW</div>
  </div>

  <div id="toolbar">
    <button class="tool-btn active" id="btnMove" title="Mover">🖐<span class="tip">Mover maqueta</span></button>
    <button class="tool-btn" id="btnRotate" title="Rotar">🔄<span class="tip">Rotar maqueta</span></button>
    <button class="tool-btn" id="btnSelect" title="Seleccionar">🔍<span class="tip">Seleccionar objeto</span></button>
    <button class="tool-btn" id="btnCat" title="Categorías">🗂<span class="tip">Mostrar/Ocultar capas</span></button>
    <button class="tool-btn" id="btnReset" title="Reset">⟳<span class="tip">Resetear vista</span></button>
  </div>

  <div id="selHint">Apunta a un objeto para seleccionarlo</div>

  <div id="catPanel">
    <div class="ph">Categorías</div>
    <div id="catList"></div>
  </div>

  <div id="propPanel">
    <div class="ph">
      <span>Propiedades</span>
      <span class="close-btn" id="closeProp">✕</span>
    </div>
    <div id="propList"></div>
  </div>

  <div id="scaleWrap">
    <label>ESCALA</label>
    <input type="range" id="scaleSlider" min="0.05" max="3" step="0.01" value="1"/>
    <span id="scaleVal">1.00×</span>
  </div>

  <div id="bottomBar">
    <button class="bottom-btn" id="enterMR">◈ Entrar en MR</button>
    <button class="bottom-btn" id="walkIn">⤢ Escala 1:1</button>
    <button class="bottom-btn" id="exitMR">✕ Salir de MR</button>
  </div>
</div>

<canvas id="c"></canvas>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════════════════
const bar = document.getElementById('bar');
const loadTxt = document.getElementById('loadTxt');
function progress(pct, msg) { bar.style.width = pct + '%'; loadTxt.textContent = msg; }

// ═══════════════════════════════════════════════════════════════
// SCENE SETUP
// ═══════════════════════════════════════════════════════════════
progress(10, 'Inicializando Three.js…');

const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.xr.enabled = true;
renderer.setClearColor(0x080c14, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x080c14, 0.018);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.01, 500);
camera.position.set(0, 2.5, 8);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Lights
const ambient = new THREE.AmbientLight(0x223344, 0.8);
scene.add(ambient);
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(8, 14, 6);
sun.castShadow = true;
sun.shadow.mapSize.set(2048, 2048);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 100;
sun.shadow.camera.left = sun.shadow.camera.bottom = -20;
sun.shadow.camera.right = sun.shadow.camera.top = 20;
scene.add(sun);
const fill = new THREE.DirectionalLight(0x334466, 0.4);
fill.position.set(-5, 4, -8);
scene.add(fill);
const pointA = new THREE.PointLight(0x00aaff, 1.5, 12);
pointA.position.set(2, 4, 0);
scene.add(pointA);
const pointB = new THREE.PointLight(0xff6633, 1.0, 10);
pointB.position.set(-3, 3, -4);
scene.add(pointB);

// Grid floor
const grid = new THREE.GridHelper(30, 60, 0x003355, 0x001a2a);
grid.position.y = -0.01;
scene.add(grid);

// ═══════════════════════════════════════════════════════════════
// MODEL ROOT — everything parented here for transform
// ═══════════════════════════════════════════════════════════════
const modelRoot = new THREE.Group();
modelRoot.name = 'MODEL_ROOT';
scene.add(modelRoot);

// ═══════════════════════════════════════════════════════════════
// PROCEDURAL INDUSTRIAL PLANT
// (Replace modelRoot contents with your loaded GLB)
// ═══════════════════════════════════════════════════════════════
progress(30, 'Generando geometría industrial…');

const MAT = {
  steel:     new THREE.MeshStandardMaterial({ color:0x8899aa, metalness:.8, roughness:.3 }),
  steelDark: new THREE.MeshStandardMaterial({ color:0x445566, metalness:.9, roughness:.2 }),
  pipe:      new THREE.MeshStandardMaterial({ color:0x99aacc, metalness:.7, roughness:.35 }),
  pipeRed:   new THREE.MeshStandardMaterial({ color:0xcc3322, metalness:.6, roughness:.4 }),
  pipeYellow:new THREE.MeshStandardMaterial({ color:0xddaa22, metalness:.5, roughness:.45 }),
  pipeGreen: new THREE.MeshStandardMaterial({ color:0x338844, metalness:.5, roughness:.45 }),
  tank:      new THREE.MeshStandardMaterial({ color:0x5577aa, metalness:.75, roughness:.25 }),
  concrete:  new THREE.MeshStandardMaterial({ color:0x8a8c8e, metalness:.05, roughness:.9 }),
  grating:   new THREE.MeshStandardMaterial({ color:0x445544, metalness:.6, roughness:.5, wireframe:true }),
  equipment: new THREE.MeshStandardMaterial({ color:0xcc8833, metalness:.7, roughness:.3 }),
  insulation:new THREE.MeshStandardMaterial({ color:0xddcc99, metalness:.1, roughness:.9 }),
  valve:     new THREE.MeshStandardMaterial({ color:0xaa2222, metalness:.8, roughness:.2 }),
  elec:      new THREE.MeshStandardMaterial({ color:0x334488, metalness:.6, roughness:.4 }),
  support:   new THREE.MeshStandardMaterial({ color:0x667788, metalness:.7, roughness:.4 }),
};

// Categories registry
const categories = {
  'Estructuras':  { color:'#4a9eff', meshes:[], visible:true },
  'Tuberías':     { color:'#aaccff', meshes:[], visible:true },
  'Equipos':      { color:'#ffaa44', meshes:[], visible:true },
  'Instrumentación': { color:'#ff5577', meshes:[], visible:true },
  'Eléctrico':    { color:'#aa66ff', meshes:[], visible:true },
  'Civil':        { color:'#99bb77', meshes:[], visible:true },
};

function addMesh(mesh, category, props = {}) {
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  mesh.userData = { category, ...props };
  modelRoot.add(mesh);
  categories[category].meshes.push(mesh);
  return mesh;
}

function box(w,h,d, mat, x,y,z, cat, props) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z);
  return addMesh(m, cat, props);
}
function cyl(rt,rb,h,seg, mat, x,y,z, cat, props) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), mat);
  m.position.set(x,y,z);
  return addMesh(m, cat, props);
}

// ── CIVIL: foundations & slabs ──────────────────────────────
box(18, .3, 14, MAT.concrete, 0, -.15, 0, 'Civil', { name:'Losa de Fundación', tag:'CIVIL-SLAB-001', material:'Hormigón H-30', area:'266 m²' });
box(4,  .2, 14, MAT.concrete, -7, -.05, 0, 'Civil', { name:'Cuneta de Drenaje', tag:'CIVIL-DRAIN-001', material:'Hormigón H-25' });

// ── ESTRUCTURAS: main steel frame ────────────────────────────
const colH = 6;
const colPos = [[-5,-3],[-5,3],[5,-3],[5,3],[0,-3],[0,3]];
colPos.forEach(([cx,cz], i) => {
  box(.25,colH,.25, MAT.steel, cx, colH/2, cz, 'Estructuras', { name:`Columna HEB-200 C-${i+1}`, tag:`STR-COL-${(i+1).toString().padStart(3,'0')}`, perfil:'HEB 200', material:'A36' });
});
// beams
[[-5,5],[5,5],[0,5]].forEach(([x1,x2],i)=>{
  box(x2-x1+.25,.2,.2, MAT.steelDark, (x1+x2)/2, colH, -3, 'Estructuras', { name:`Viga IPE-300 V-${i*2+1}`, tag:`STR-BM-${(i*2+1).toString().padStart(3,'0')}`, perfil:'IPE 300', material:'A36' });
  box(x2-x1+.25,.2,.2, MAT.steelDark, (x1+x2)/2, colH,  3, 'Estructuras', { name:`Viga IPE-300 V-${i*2+2}`, tag:`STR-BM-${(i*2+2).toString().padStart(3,'0')}`, perfil:'IPE 300', material:'A36' });
});
// bracing
[-3, 3].forEach((z, i) => {
  const br = new THREE.Mesh(new THREE.BoxGeometry(10.1,.12,.12), MAT.steelDark);
  br.position.set(0, colH, z);
  br.userData = { category:'Estructuras', name:`Arriostramiento AR-${i+1}`, tag:`STR-BR-${i+1}`, material:'A36' };
  modelRoot.add(br); categories['Estructuras'].meshes.push(br);
});
// grating floor at 3m
box(10.3,.05,6.3, MAT.grating, 0, 3, 0, 'Estructuras', { name:'Piso Rejilla Nivel 3.0m', tag:'STR-GR-001', material:'Acero galvanizado', nivel:'EL +3000' });
// stairs
for(let s=0;s<6;s++) {
  box(1,.1,.35, MAT.steel, -5.8, s*.28+.14, -3+s*.35, 'Estructuras', { name:`Escalera paso ${s+1}`, tag:'STR-STAIR-001' });
}
// handrail
box(.04,1,.04, MAT.pipe, -5.4, 3.6, -3,   'Estructuras', { name:'Pasamanos', tag:'STR-HR-001' });
box(.04,1,.04, MAT.pipe, -5.4, 3.6, -1.3, 'Estructuras', { name:'Pasamanos', tag:'STR-HR-001' });
box(.04,.04,1.7,MAT.pipe, -5.4, 4.1, -2.1,'Estructuras', { name:'Pasamanos', tag:'STR-HR-001' });

progress(50, 'Generando tuberías y equipos…');

// ── EQUIPOS ──────────────────────────────────────────────────
// T-101 large vertical tank
const tank101 = cyl(.9,.9,3.5,32, MAT.tank, -3,1.75,-1,'Equipos', { name:'Tanque T-101 (Proceso)', tag:'T-101', capacidad:'45 m³', presion:'10 bar', temperatura:'80 °C', fluido:'Agua de proceso' });
const head101top = new THREE.Mesh(new THREE.SphereGeometry(.9,32,16,0,Math.PI*2,0,Math.PI/2), MAT.tank);
head101top.position.set(-3,3.5,-1); head101top.userData={category:'Equipos',name:'T-101 Tapa Superior',tag:'T-101'}; modelRoot.add(head101top); categories['Equipos'].meshes.push(head101top);
const head101bot = new THREE.Mesh(new THREE.SphereGeometry(.9,32,16,0,Math.PI*2,Math.PI/2,Math.PI/2), MAT.tank);
head101bot.position.set(-3,0,-1); head101bot.userData={category:'Equipos',name:'T-101 Tapa Inferior',tag:'T-101'}; modelRoot.add(head101bot); categories['Equipos'].meshes.push(head101bot);
// Insulation around T-101
cyl(.97,.97,3.5,32, MAT.insulation, -3,1.75,-1,'Equipos', { name:'Aislación T-101', tag:'T-101-INS', tipo:'Lana mineral 2"' });

// T-102 horizontal drum
const drum = new THREE.Mesh(new THREE.CylinderGeometry(.6,.6,3,32), MAT.tank);
drum.rotation.z = Math.PI/2; drum.position.set(2,1,-2);
drum.userData={category:'Equipos',name:'Separador S-101',tag:'S-101',capacidad:'8 m³',presion:'25 bar',temperatura:'120 °C',fluido:'Gas/Líquido'};
modelRoot.add(drum); categories['Equipos'].meshes.push(drum);
// drum caps
[-1.5,1.5].forEach((dx,i)=>{
  const cap=new THREE.Mesh(new THREE.SphereGeometry(.6,32,16,0,Math.PI*2,0,Math.PI/2),MAT.tank);
  cap.rotation.z=i===0?-Math.PI/2:Math.PI/2; cap.position.set(2+dx,1,-2);
  cap.userData={category:'Equipos',name:'Separador S-101 Tapa',tag:'S-101'}; modelRoot.add(cap); categories['Equipos'].meshes.push(cap);
});

// P-101 Pump
box(.5,.4,.6, MAT.equipment, 1.5,.2,1.5,'Equipos', { name:'Bomba Centrífuga P-101A', tag:'P-101A', tipo:'Centrífuga horizontal', caudal:'120 m³/h', NPSHr:'3.2 m', motor:'45 kW' });
const pumpSh=cyl(.12,.12,.7,16, MAT.steelDark, 1.5,.6,1.5,'Equipos',{name:'P-101A Carcasa',tag:'P-101A'});
box(.5,.4,.6, MAT.equipment, 3,.2,1.5,'Equipos', { name:'Bomba Centrífuga P-101B', tag:'P-101B', tipo:'Centrífuga horizontal', caudal:'120 m³/h', NPSHr:'3.2 m', motor:'45 kW', estado:'Stand-by' });
cyl(.12,.12,.7,16, MAT.steelDark, 3,.6,1.5,'Equipos',{name:'P-101B Carcasa',tag:'P-101B'});

// E-101 Heat exchanger
cyl(.45,.45,2,32, MAT.steelDark, 3.5,1,0,'Equipos',{name:'Intercambiador E-101',tag:'E-101',tipo:'Carcasa y tubos',area:'85 m²',Q:'2.4 MW'});
cyl(.5,.5,.12,32, MAT.steel, 3.5,2.1,0,'Equipos',{name:'E-101 Brida superior',tag:'E-101'});
cyl(.5,.5,.12,32, MAT.steel, 3.5,-0.1,0,'Equipos',{name:'E-101 Brida inferior',tag:'E-101'});

// Compressor K-101
box(1.2,.8,1, MAT.equipment, -1,.4,-3,'Equipos',{name:'Compresor K-101',tag:'K-101',tipo:'Centrífugo etapa única',caudal:'5000 Nm³/h',potencia:'280 kW'});
cyl(.25,.25,.9,16, MAT.steelDark, -1,1.25,-3,'Equipos',{name:'K-101 Carcasa',tag:'K-101'});
box(.6,.5,.5, MAT.equipment, 0.1,.25,-3,'Equipos',{name:'K-101 Motor',tag:'K-101-MTR',potencia:'280 kW',voltaje:'4160 V'});

// ── TUBERÍAS ────────────────────────────────────────────────
function pipe(x1,y1,z1,x2,y2,z2, mat, cat, props, r=.06) {
  const dx=x2-x1,dy=y2-y1,dz=z2-z1;
  const len=Math.sqrt(dx*dx+dy*dy+dz*dz);
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,12),mat);
  m.position.set((x1+x2)/2,(y1+y2)/2,(z1+z2)/2);
  m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),new THREE.Vector3(dx,dy,dz).normalize());
  m.userData={category:cat,...props};
  modelRoot.add(m); categories[cat].meshes.push(m);
  return m;
}
function elbow(x,y,z, cat, mat, props, r=.08) {

  m.position.set(x,y,z); m.userData={category:cat,...props};

}

// ORBIT CONTROLS (manual — no import needed)
// ═══════════════════════════════════════════════════════════════
let isOrbit = false, lastX = 0, lastY = 0;
let orbitTheta = 0, orbitPhi = 1.0, orbitRadius = 10;
const orbitTarget = new THREE.Vector3(0, 1.5, 0);

canvas.addEventListener('mousedown', e => { if(activeTool!=='select'){ isOrbit=true; lastX=e.clientX; lastY=e.clientY; } });
canvas.addEventListener('mouseup', () => isOrbit=false);
canvas.addEventListener('mousemove', e => {
  if(!isOrbit) return;
  const dx = (e.clientX-lastX)*.005, dy = (e.clientY-lastY)*.005;
  lastX=e.clientX; lastY=e.clientY;
  orbitTheta -= dx; orbitPhi = Math.max(.1, Math.min(Math.PI-.1, orbitPhi+dy));
  updateCamera();
});
canvas.addEventListener('wheel', e => {
  orbitRadius = Math.max(1, Math.min(40, orbitRadius + e.deltaY*.01));
  updateCamera();
});
// touch orbit
let tLast=null;
canvas.addEventListener('touchstart', e=>{ tLast={x:e.touches[0].clientX,y:e.touches[0].clientY}; });
canvas.addEventListener('touchmove', e=>{
  if(!tLast) return;
  const dx=(e.touches[0].clientX-tLast.x)*.005, dy=(e.touches[0].clientY-tLast.y)*.005;
  tLast={x:e.touches[0].clientX,y:e.touches[0].clientY};
  orbitTheta-=dx; orbitPhi=Math.max(.1,Math.min(Math.PI-.1,orbitPhi+dy));
  updateCamera();
});

function updateCamera() {
  camera.position.set(
    orbitTarget.x + orbitRadius*Math.sin(orbitPhi)*Math.sin(orbitTheta),
    orbitTarget.y + orbitRadius*Math.cos(orbitPhi),
    orbitTarget.z + orbitRadius*Math.sin(orbitPhi)*Math.cos(orbitTheta)
  );
  camera.lookAt(orbitTarget);
}
updateCamera();

// TOOLS
// ═══════════════════════════════════════════════════════════════
let activeTool = 'move'; // move | rotate | select
const toolBtns = { move:document.getElementById('btnMove'), rotate:document.getElementById('btnRotate'), select:document.getElementById('btnSelect') };

function setTool(t) {
  activeTool = t;
  Object.entries(toolBtns).forEach(([k,b])=> b.classList.toggle('active', k===t));
  document.getElementById('selHint').classList.toggle('show', t==='select');
}
document.getElementById('btnMove').onclick   = ()=> setTool('move');
document.getElementById('btnRotate').onclick = ()=> setTool('rotate');
document.getElementById('btnSelect').onclick = ()=> setTool('select');
document.getElementById('btnReset').onclick  = ()=> {
  modelRoot.position.set(0,0,0);
  modelRoot.rotation.set(0,0,0);
  scaleSlider.value=1; scaleVal.textContent='1.00×';
  modelRoot.scale.setScalar(1);
  orbitRadius=10; orbitPhi=1.0; orbitTheta=0; updateCamera();
};

// ── Drag to move / rotate model ─────────────────────────────
let isDrag=false, dragLast={x:0,y:0};
canvas.addEventListener('mousedown', e=>{ if(activeTool==='move'||activeTool==='rotate'){ isDrag=true; dragLast={x:e.clientX,y:e.clientY}; } });
canvas.addEventListener('mouseup', ()=>isDrag=false);
canvas.addEventListener('mousemove', e=>{
  if(!isDrag) return;
  const dx=(e.clientX-dragLast.x), dy=(e.clientY-dragLast.y);
  dragLast={x:e.clientX,y:e.clientY};
  if(activeTool==='move'){ modelRoot.position.x+=dx*.004; modelRoot.position.z+=dy*.004; }
  if(activeTool==='rotate'){ modelRoot.rotation.y+=dx*.008; }
});

// ── Scale slider ─────────────────────────────────────────────
const scaleSlider = document.getElementById('scaleSlider');
const scaleVal    = document.getElementById('scaleVal');
scaleSlider.addEventListener('input', ()=>{

  modelRoot.scale.setScalar(v);
  scaleVal.textContent = v.toFixed(2)+'×';
});

// ═══════════════════════════════════════════════════════════════
// RAYCASTING — selection
// ═══════════════════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedMesh = null;
const selMat = new THREE.MeshStandardMaterial({ color:0x00eeff, emissive:0x00aacc, emissiveIntensity:.5, metalness:.8, roughness:.2 });
let origMat = null;

canvas.addEventListener('click', e=>{
  if(activeTool!=='select') return;
  mouse.x=(e.clientX/window.innerWidth)*2-1;
  mouse.y=-(e.clientY/window.innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(modelRoot.children, true);
  if(hits.length){
    selectObject(hits[0].object);
  } else {
    deselectObject();
  }
});

function selectObject(mesh) {
  if(selectedMesh && selectedMesh!==mesh){ deselectObject(); }
  if(!mesh.userData.name) return;
  selectedMesh = mesh;
  origMat = mesh.material;
  mesh.material = selMat;
  showProps(mesh.userData);
}
function deselectObject() {
  if(selectedMesh){ selectedMesh.material = origMat; selectedMesh=null; }
  document.getElementById('propPanel').style.display='none';
}
document.getElementById('closeProp').onclick = deselectObject;

function showProps(data) {
  const panel = document.getElementById('propPanel');
  const list  = document.getElementById('propList');
  panel.style.display='block';
  const cat = categories[data.category];
  const skip = ['category'];
  list.innerHTML = `
    <div class="prop-row"><span class="prop-key">CATEGORÍA</span><span class="prop-val"><span class="prop-cat-badge" style="background:${cat?.color||'#444'}22;color:${cat?.color||'#aaa'};border:1px solid ${cat?.color||'#444'}44">${data.category||'—'}</span></span></div>
  ` + Object.entries(data).filter(([k])=>!skip.includes(k)).map(([k,v])=>
    `<div class="prop-row"><span class="prop-key">${k.toUpperCase()}</span><span class="prop-val">${v}</span></div>`
  ).join('');
}

document.getElementById('btnCat').onclick = ()=> catPanel.style.display = catPanel.style.display==='block'?'none':'block';

function buildCatPanel() {
  catList.innerHTML = '';
  Object.entries(categories).forEach(([name, cat]) => {
    const count = cat.meshes.length;
    const div = document.createElement('div');
    div.className = 'cat-item' + (cat.visible?'':' hidden');
    div.innerHTML = `
      <div class="cat-dot" style="background:${cat.color}"></div>
      <span class="cat-label">${name}</span>
      <span class="cat-count">${count}</span>
      <span class="eye-btn">${cat.visible?'👁':'🚫'}</span>
    `;
    div.onclick = () => {
      cat.visible = !cat.visible;
      cat.meshes.forEach(m => m.visible = cat.visible);
      div.classList.toggle('hidden', !cat.visible);
      div.querySelector('.eye-btn').textContent = cat.visible?'👁':'🚫';
    };
    catList.appendChild(div);
  });
}

const enterMRBtn = document.getElementById('enterMR');
const walkInBtn  = document.getElementById('walkIn');
const exitMRBtn  = document.getElementById('exitMR');

let xrSession = null;
let walkInMode = false;

// Walk-in 1:1 scale button
walkInBtn.onclick = () => {
  walkInMode = !walkInMode;
  if(walkInMode){
    modelRoot.scale.setScalar(1);
    scaleSlider.value=1; scaleVal.textContent='1.00×';
    modelRoot.position.set(0,0,0);
    orbitRadius=4; orbitPhi=1.3; updateCamera();
    walkInBtn.textContent='⬡ Escala Maqueta';
    walkInBtn.style.background='linear-gradient(135deg,#ff9933,#cc5500)';
  } else {
    orbitRadius=10; orbitPhi=1.0; updateCamera();
    walkInBtn.textContent='⤢ Escala 1:1';
    walkInBtn.style.background='';
  }
};

enterMRBtn.onclick = async () => {
  if(!navigator.xr){ alert('WebXR no disponible. Usa el Meta Browser del Quest 3.'); return; }
  const mrOk = await navigator.xr.isSessionSupported('immersive-ar');
  const vrOk = await navigator.xr.isSessionSupported('immersive-vr');
  if(!mrOk && !vrOk){ alert('Ni AR ni VR soportados en este dispositivo.'); return; }

  const mode = mrOk ? 'immersive-ar' : 'immersive-vr';
  const features = ['local-floor'];
  const optional = ['hand-tracking','dom-overlay'];
  const opts = { requiredFeatures: features, optionalFeatures: optional };
  if(mode==='immersive-ar') opts.optionalFeatures.push('hit-test');
  if(document.getElementById('hud')) opts.domOverlay = { root: document.getElementById('hud') };

  try {
    xrSession = await navigator.xr.requestSession(mode, opts);
  } catch(e) { console.error(e); return; }

  renderer.xr.setSession(xrSession);
  modeBadge.textContent = mode==='immersive-ar'?'MR ACTIVO':'VR ACTIVO';
  modeBadge.classList.add('mr');
  exitMRBtn.style.display='block';
  enterMRBtn.style.display='none';
  walkInBtn.style.display='none';
  renderer.setClearColor(0x000000, mode==='immersive-ar'?0:1);

  xrSession.addEventListener('end', ()=>{
    xrSession=null;
    modeBadge.textContent='3D PREVIEW'; modeBadge.classList.remove('mr');
    exitMRBtn.style.display='none'; enterMRBtn.style.display='block'; walkInBtn.style.display='block';
    renderer.setClearColor(0x080c14,1);
  });

  renderer.setAnimationLoop(xrRender);
};

exitMRBtn.onclick = ()=>{ if(xrSession) xrSession.end(); };

// XR controllers for move/rotate in MR
const controller0 = renderer.xr.getController(0);
const controller1 = renderer.xr.getController(1);
scene.add(controller0); scene.add(controller1);

let ctrl0Down=false, ctrl1Down=false;
let ctrl0LastPos=new THREE.Vector3(), ctrl1LastPos=new THREE.Vector3();

controller0.addEventListener('selectstart',()=>{ ctrl0Down=true; ctrl0LastPos.copy(controller0.position); });
controller0.addEventListener('selectend',()=>  { ctrl0Down=false; });
controller1.addEventListener('selectstart',()=>{ ctrl1Down=true; ctrl1LastPos.copy(controller1.position); });
controller1.addEventListener('selectend',()=>  { ctrl1Down=false; });

// controller ray
[controller0, controller1].forEach(c=>{
  const ray=new THREE.Mesh(
    new THREE.CylinderGeometry(.002,.002,.3,6),
    new THREE.MeshBasicMaterial({color:0x00ccff,transparent:true,opacity:.6})
  );
  ray.rotation.x=-Math.PI/2; ray.position.z=-.15;
  c.add(ray);
});

// ═══════════════════════════════════════════════════════════════
// RENDER LOOPS
// ═══════════════════════════════════════════════════════════════
let t = 0;

// Desktop loop
renderer.setAnimationLoop(desktopRender);

function desktopRender(time) {
  if(xrSession) return; // XR loop takes over
  t = time * .001;
  // gentle model bob animation
  modelRoot.position.y = Math.sin(t*.3)*.03;
  // animate point lights
  pointA.intensity = 1.3 + .4*Math.sin(t*1.1);
  renderer.render(scene, camera);
}

function xrRender(time, frame) {
  t = time * .001;
  // Handle controller-driven model move/rotate in XR
  if(ctrl0Down){
    const delta = controller0.position.clone().sub(ctrl0LastPos);
    if(activeTool==='move') modelRoot.position.add(delta.multiplyScalar(2));
    if(activeTool==='rotate') modelRoot.rotation.y += (controller0.position.x-ctrl0LastPos.x)*3;
    ctrl0LastPos.copy(controller0.position);
  }
  renderer.render(scene, camera);
}
